name: Sync Claude Code Releases

# Resync Cron 尝试更新 Workflow 看看 Crob 是否起作用
on:
  schedule:
    - cron: '9 * * * *'  # 每小时检查一次
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write  # 创建 Release 和提交代码需要写权限

env:
  DOWNLOAD_BASE_URL: https://downloads.claude.ai/claude-code-releases

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取上游最新版本
          VERSION=$(curl -fsSL "$DOWNLOAD_BASE_URL/latest")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "检测到上游版本: $VERSION"

          # 检查 Release 是否已存在
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "版本 $VERSION 已存在，跳过"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "版本 $VERSION 不存在，开始同步"
          fi

      - name: Download manifest and binaries
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          VERSION="${{ steps.check.outputs.version }}"

          echo "下载 manifest.json..."
          curl -fsSL -o manifest.json "$DOWNLOAD_BASE_URL/$VERSION/manifest.json"

          # 动态解析平台列表
          PLATFORMS=$(jq -r '.platforms | keys[]' manifest.json)
          echo "支持的平台: $PLATFORMS"

          # 下载各平台二进制并验证 checksum
          DOWNLOADED_PLATFORMS=""
          for platform in $PLATFORMS; do
            # 先检查文件是否存在
            URL="$DOWNLOAD_BASE_URL/$VERSION/$platform/claude"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

            if [ "$HTTP_CODE" = "404" ]; then
              echo "⚠ 警告: $platform 平台二进制不存在（manifest 中有记录但上游未提供），跳过"
              continue
            elif [ "$HTTP_CODE" != "200" ]; then
              echo "错误: $platform 平台返回 HTTP $HTTP_CODE"
              exit 1
            fi

            echo "下载 $platform 平台二进制..."
            curl -fsSL -o "claude-$platform" "$URL"

            # 验证 checksum
            EXPECTED=$(jq -r ".platforms[\"$platform\"].checksum" manifest.json)
            ACTUAL=$(sha256sum "claude-$platform" | cut -d' ' -f1)

            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "错误: $platform 平台 checksum 不匹配"
              echo "期望: $EXPECTED"
              echo "实际: $ACTUAL"
              exit 1
            fi

            echo "✓ $platform checksum 验证通过"
            DOWNLOADED_PLATFORMS="$DOWNLOADED_PLATFORMS $platform"
          done

          # 检查至少下载了一个平台
          if [ -z "$DOWNLOADED_PLATFORMS" ]; then
            echo "错误: 没有成功下载任何平台的二进制"
            exit 1
          fi

          echo "成功下载的平台:$DOWNLOADED_PLATFORMS"

          # 下载上游安装脚本
          echo "下载上游安装脚本..."
          curl -fsSL -o install.origin.sh "https://claude.ai/install.sh"
          chmod +x install.origin.sh

      - name: Generate modified install.sh
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e

          echo "生成修改后的安装脚本..."

          # 使用 sed 替换 URL
          # 策略：保留上游 /latest，下载 manifest 和二进制时切到 GitHub Release
          sed -e '/^DOWNLOAD_BASE_URL=/a RELEASE_BASE="https://github.com/'"$GITHUB_REPOSITORY"'/releases/download"' \
              -e 's|manifest_json=$(download_file "\$DOWNLOAD_BASE_URL/\$version/manifest.json")|manifest_json=$(download_file "$RELEASE_BASE/$version/manifest.json")|g' \
              -e 's|if ! download_file "\$DOWNLOAD_BASE_URL/\$version/\$platform/claude" "\$binary_path"; then|if ! download_file "$RELEASE_BASE/$version/claude-$platform" "$binary_path"; then|g' \
              install.origin.sh > install.sh

          chmod +x install.sh

          echo "验证修改后的脚本..."
          if ! grep -Fq 'RELEASE_BASE=' install.sh; then
            echo "错误: RELEASE_BASE 变量添加失败"
            exit 1
          fi
          if ! grep -Fq 'manifest_json=$(download_file "$RELEASE_BASE/$version/manifest.json")' install.sh; then
            echo "错误: manifest 下载地址替换失败"
            exit 1
          fi
          if ! grep -Fq 'if ! download_file "$RELEASE_BASE/$version/claude-$platform" "$binary_path"; then' install.sh; then
            echo "错误: 二进制下载地址替换失败"
            exit 1
          fi
          if ! grep -Fq 'version=$(download_file "$DOWNLOAD_BASE_URL/latest")' install.sh; then
            echo "错误: /latest 下载地址不应被修改"
            exit 1
          fi
          if ! grep -Fq "github.com/$GITHUB_REPOSITORY" install.sh; then
            echo "错误: GitHub URL 替换失败"
            exit 1
          fi
          bash -n install.sh

          echo "✓ 安装脚本生成成功"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          VERSION="${{ steps.check.outputs.version }}"

          # 生成 Release Notes
          cat > RELEASE_NOTES.md <<EOF
          # Claude Code $VERSION

          同步自官方分发版本

          ## 安装方法
          \`\`\`bash
          curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/download/$VERSION/install.sh | bash
          \`\`\`

          ## 支持平台
          $(for f in claude-*; do [ -f "$f" ] && echo "- ${f#claude-}"; done)

          ## 文件说明
          - \`manifest.json\` - 平台 checksum 和元数据
          - \`claude-*\` - 各平台二进制文件
          - \`install.origin.sh\` - 上游原始安装脚本
          - \`install.sh\` - 修改后的安装脚本（指向 GitHub Release）
          EOF

          echo "创建 GitHub Release..."
          gh release create "$VERSION" \
            --title "Claude Code $VERSION" \
            --notes-file RELEASE_NOTES.md \
            manifest.json \
            claude-* \
            install.origin.sh \
            install.sh

          echo "✓ Release 创建成功: $VERSION"
